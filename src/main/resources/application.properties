# Web
server.port=${PORT:8080}

# Postgres read-model store (separate database from evento-server's own)
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/todo}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:secret}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Evento's FlywayMigrator (EventoConfig) handles the evento_v2_* migrations
# with the right dialect; Spring's Flyway autoconfig would double-scan the
# jar's postgres+mysql scripts and fail on duplicate versions.
spring.flyway.enabled=false

# Evento
evento.server.host=${EVENTO_SERVER_HOST:localhost}
evento.server.port=${EVENTO_SERVER_PORT:3030}
evento.bundle.id=todo-bundle
evento.bundle.version=2

# Demo niceties
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
logging.level.com.evento=INFO
